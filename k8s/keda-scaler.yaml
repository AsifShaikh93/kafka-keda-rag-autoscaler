apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rag-worker-scaler
  namespace: ai-agent-ns
spec:
  scaleTargetRef:
    name: rag-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka.ai-agent-ns.svc.cluster.local:9092
      consumerGroup: rag-workers
      topic: rag-requests
      lagThreshold: '5'
      activationLagThreshold: '3'
      offsetResetPolicy: latest